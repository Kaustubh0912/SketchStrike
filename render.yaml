services:
  - type: web
    name: sketchstrike-server        # PROD
    runtime: node
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install --include=dev && npm run build --workspace=@sketchstrike/server
    startCommand: npm run start --workspace=@sketchstrike/server
    healthCheckPath: /health
    autoDeploy: false                # prod: deploy manually / on merge
    envVars:
      - { key: NODE_VERSION, value: "20" }
      - { key: CORS_ORIGIN, sync: false }   # set to prod Vercel URL
      - { key: MAX_ROOMS, value: "1000" }
      - { key: MAX_CONNECTIONS_PER_IP, value: "30" }
      - { key: ROOM_CREATE_PER_MIN, value: "12" }

  - type: web
    name: sketchstrike-server-dev    # STAGING
    runtime: node
    plan: free
    branch: dev
    rootDir: .
    buildCommand: npm install --include=dev && npm run build --workspace=@sketchstrike/server
    startCommand: npm run start --workspace=@sketchstrike/server
    healthCheckPath: /health
    autoDeploy: true                 # dev: auto-deploy every push to dev
    envVars:
      - { key: NODE_VERSION, value: "20" }
      - { key: CORS_ORIGIN, sync: false }   # set to dev Vercel preview URL
      - { key: MAX_ROOMS, value: "1000" }
      - { key: MAX_CONNECTIONS_PER_IP, value: "30" }
      - { key: ROOM_CREATE_PER_MIN, value: "12" }