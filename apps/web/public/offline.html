<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fef6e4" />
    <title>Offline — SketchStrike</title>
    <style>
      :root {
        --bg: #fef6e4;
        --ink: #001858;
        --primary: #f582ae;
        --accent: #ffd803;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: 'Space Grotesk', system-ui, -apple-system, Segoe UI, sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        background: #fff;
        border: 3px solid var(--ink);
        border-radius: 14px;
        box-shadow: 8px 8px 0 var(--ink);
        padding: 32px 28px;
        max-width: 360px;
        width: 100%;
      }
      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        display: block;
      }
      h1 { font-size: 1.6rem; margin: 0 0 8px; letter-spacing: -0.02em; }
      p { margin: 0 0 22px; color: #4b4f6a; line-height: 1.5; }
      button {
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        background: var(--primary);
        color: var(--ink);
        border: 3px solid var(--ink);
        border-radius: 10px;
        box-shadow: 3px 3px 0 var(--ink);
        padding: 12px 22px;
        min-height: 48px;
      }
      button:active { transform: translate(3px, 3px); box-shadow: none; }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="mark" src="/icons/icon-192.png" alt="SketchStrike" />
      <h1>You're offline</h1>
      <p>SketchStrike needs a connection to draw and guess together. Reconnect and try again.</p>
      <button type="button" onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
